# fly.toml app configuration file generated for rag-chatbot-v3 on 2026-04-12T10:20:42Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rag-chatbot-v3'
primary_region = 'syd'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"
  min_machines_running = 0
  
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
