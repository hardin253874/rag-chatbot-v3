app = "rag-chatbot-v3-mcp"
primary_region = "syd"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"
  min_machines_running = 0

[env]
  PORT = "8080"
  RAG_API_URL = "https://rag-chatbot-v3-production.up.railway.app"
